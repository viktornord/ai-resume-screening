services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      MOCK_LLM: ${MOCK_LLM:-false}
      MATCH_THRESHOLD_GOOD_FIT: 70
      CONFIDENCE_THRESHOLD: 0.6
      MAX_RESUME_CHARS: 8000
      MAX_JD_CHARS: 16000
      MAX_CONCURRENT_LLM: 4
      LLM_TIMEOUT_SECONDS: 900
      LLM_MAX_TOKENS: 8192
      LOG_LEVEL: INFO

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    ports:
      - "3000:80"
    depends_on:
      - backend
