services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: mistral
      MOCK_LLM: ${MOCK_LLM:-false}
      MATCH_THRESHOLD_GOOD_FIT: 70
      CONFIDENCE_THRESHOLD: 0.6
      MAX_RESUME_CHARS: 8000
      MAX_CONCURRENT_LLM: 3
    depends_on:
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  ollama_data:
